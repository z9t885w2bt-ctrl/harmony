<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Harmony Choir｜即時人聲和聲器</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 210, 250, 0.22), transparent 34%),
        radial-gradient(circle at 82% 20%, rgba(180, 220, 255, 0.20), transparent 34%),
        radial-gradient(circle at 50% 90%, rgba(255, 230, 180, 0.12), transparent 42%),
        #050511;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: white;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .panel {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      width: min(380px, calc(100vw - 28px));
      padding: 14px;
      border-radius: 22px;
      background: rgba(8, 8, 22, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.03em;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 11px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.68);
      margin-bottom: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 9px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.78);
    }

    input[type="range"] {
      width: 100%;
      accent-color: rgba(255, 224, 255, 0.9);
    }

    select {
      width: 100%;
      margin-top: 6px;
      padding: 9px 10px;
      border-radius: 999px;
      color: white;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.18);
      outline: none;
    }

    option {
      color: #111;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 12px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, rgba(255, 218, 255, 0.30), rgba(190, 220, 255, 0.22));
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 10px 24px rgba(0,0,0,0.20);
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    .status {
      margin-top: 11px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.10);
      font-size: 11px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.70);
    }

    .note-card {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      width: min(430px, 82vw);
      aspect-ratio: 1 / 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .note-inner {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at 33% 27%, rgba(255,255,255,0.58), transparent 12%),
        radial-gradient(circle at 65% 70%, rgba(180,220,255,0.18), transparent 36%),
        linear-gradient(135deg, rgba(255, 225, 255, 0.23), rgba(170, 215, 255, 0.15), rgba(255, 239, 190, 0.13));
      border: 1.5px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.32),
        inset 0 -28px 60px rgba(255,255,255,0.045),
        0 0 80px rgba(255, 215, 255, 0.18),
        0 0 160px rgba(160, 210, 255, 0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .detected-note {
      font-size: clamp(58px, 13vw, 124px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: -0.05em;
      text-shadow: 0 0 28px rgba(255, 225, 255, 0.45);
    }

    .detected-meta {
      margin-top: 12px;
      font-size: clamp(13px, 2vw, 16px);
      color: rgba(255,255,255,0.66);
      line-height: 1.6;
    }

    .hint {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      max-width: min(410px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 18px;
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      line-height: 1.55;
      background: rgba(10, 10, 24, 0.42);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 210, 250, 0.18), transparent 34%),
        rgba(4, 4, 12, 0.88);
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
    }

    .start-card {
      width: min(540px, 100%);
      padding: 30px;
      border-radius: 30px;
      text-align: center;
      background: linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.045));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 28px 90px rgba(0,0,0,0.42);
    }

    .start-card h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 7vw, 62px);
      letter-spacing: -0.04em;
      line-height: 1.02;
    }

    .start-card p {
      margin: 0 auto 22px;
      max-width: 420px;
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,0.78);
    }

    #startBtn {
      font-size: 16px;
      padding: 14px 24px;
      background: linear-gradient(135deg, rgba(255, 230, 255, 0.38), rgba(200, 230, 255, 0.26));
    }

    @media (max-width: 720px) {
      .panel {
        width: calc(100vw - 24px);
        left: 12px;
        top: 12px;
        padding: 11px;
      }

      .subtitle {
        display: none;
      }

      .note-card {
        top: 55%;
        width: min(360px, 78vw);
      }

      .hint {
        left: 12px;
        right: 12px;
        bottom: 12px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <canvas id="stage"></canvas>

  <div class="panel">
    <div class="title">Voice Harmony Choir</div>
    <div class="subtitle">
      唱進麥克風，系統會即時把你的聲音疊成多層和聲。建議戴耳機使用。
    </div>

    <div class="row">
      <span>和聲模式</span>
      <span id="modeLabel">華麗大調</span>
    </div>
    <select id="modeSelect">
      <option value="royal">華麗大調 Choir Rock</option>
      <option value="minor">陰暗小調 Dark Minor</option>
      <option value="angel">透明天使 Angel Choir</option>
      <option value="thick">超厚歌劇 Huge Stack</option>
    </select>

    <div class="row">
      <span>和聲厚度</span>
      <span id="amountLabel">70%</span>
    </div>
    <input id="amountSlider" type="range" min="0" max="100" step="1" value="70" />

    <div class="row">
      <span>原聲音量</span>
      <span id="dryLabel">15%</span>
    </div>
    <input id="drySlider" type="range" min="0" max="100" step="1" value="15" />

    <div class="row">
      <span>殘響空間</span>
      <span id="reverbLabel">48%</span>
    </div>
    <input id="reverbSlider" type="range" min="0" max="90" step="1" value="48" />

    <div class="row">
      <span>偵測靈敏度</span>
      <span id="senseLabel">45%</span>
    </div>
    <input id="senseSlider" type="range" min="15" max="80" step="1" value="45" />

    <div class="button-row">
      <button id="muteBtn">暫停聲音</button>
      <button id="panicBtn">全部切掉</button>
    </div>

    <div class="status" id="status">
      尚未啟動。請按下開始，允許麥克風權限。
    </div>
  </div>

  <div class="note-card">
    <div class="note-inner" id="noteOrb">
      <div>
        <div class="detected-note" id="noteName">—</div>
        <div class="detected-meta" id="noteMeta">
          等待你的聲音
        </div>
      </div>
    </div>
  </div>

  <div class="hint">
    唱單音最穩。先唱「啊——」或「喔——」，不要開太大聲。這個網頁版會有一點點延遲，屬於即時移調的正常現象。
  </div>

  <div class="overlay" id="overlay">
    <div class="start-card">
      <h1>Sing One Note,<br>Become A Choir</h1>
      <p>
        按下開始後，請允許麥克風。你唱一個音，網頁會即時幫你疊出多層和聲。
        強烈建議戴耳機，避免回授尖叫。
      </p>
      <button id="startBtn">開始使用麥克風</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");

    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const muteBtn = document.getElementById("muteBtn");
    const panicBtn = document.getElementById("panicBtn");

    const statusEl = document.getElementById("status");
    const noteNameEl = document.getElementById("noteName");
    const noteMetaEl = document.getElementById("noteMeta");
    const noteOrb = document.getElementById("noteOrb");

    const modeSelect = document.getElementById("modeSelect");
    const modeLabel = document.getElementById("modeLabel");

    const amountSlider = document.getElementById("amountSlider");
    const amountLabel = document.getElementById("amountLabel");

    const drySlider = document.getElementById("drySlider");
    const dryLabel = document.getElementById("dryLabel");

    const reverbSlider = document.getElementById("reverbSlider");
    const reverbLabel = document.getElementById("reverbLabel");

    const senseSlider = document.getElementById("senseSlider");
    const senseLabel = document.getElementById("senseLabel");

    let W = window.innerWidth;
    let H = window.innerHeight;

    let running = false;
    let audioReady = false;
    let muted = false;

    let mic;
    let analyser;
    let master;
    let dryVolume;
    let wetBus;
    let chorus;
    let reverb;
    let limiter;

    let layerNodes = [];
    let currentMode = "royal";

    let detectedPitch = null;
    let detectedNote = "—";
    let detectedCents = 0;
    let detectedRms = 0;
    let voiceActive = false;
    let smoothEnergy = 0;
    let displayEnergy = 0;

    const noteNames = ["C", "C♯", "D", "E♭", "E", "F", "F♯", "G", "A♭", "A", "B♭", "B"];

    const modes = {
      royal: {
        label: "華麗大調",
        description: "大三度、五度、八度，最接近華麗搖滾合唱感。",
        intervals: [
          { name: "低八度", semitone: -12, gain: -19, pan: -0.20 },
          { name: "低五度", semitone: -5, gain: -24, pan: 0.18 },
          { name: "大三度", semitone: 4, gain: -16, pan: -0.30 },
          { name: "五度", semitone: 7, gain: -17, pan: 0.30 },
          { name: "高八度", semitone: 12, gain: -22, pan: 0.05 },
          { name: "高五度", semitone: 19, gain: -27, pan: -0.08 }
        ]
      },
      minor: {
        label: "陰暗小調",
        description: "小三度、五度、低八度，會比較悲劇、暗色。",
        intervals: [
          { name: "低八度", semitone: -12, gain: -18, pan: -0.18 },
          { name: "低五度", semitone: -5, gain: -23, pan: 0.22 },
          { name: "小三度", semitone: 3, gain: -15, pan: -0.30 },
          { name: "五度", semitone: 7, gain: -17, pan: 0.28 },
          { name: "高八度", semitone: 12, gain: -23, pan: 0.03 },
          { name: "高小三度", semitone: 15, gain: -27, pan: -0.04 }
        ]
      },
      angel: {
        label: "透明天使",
        description: "高八度和高五度比較多，會比較空靈。",
        intervals: [
          { name: "大三度", semitone: 4, gain: -19, pan: -0.26 },
          { name: "五度", semitone: 7, gain: -20, pan: 0.26 },
          { name: "高八度", semitone: 12, gain: -17, pan: -0.10 },
          { name: "高三度", semitone: 16, gain: -24, pan: 0.10 },
          { name: "高五度", semitone: 19, gain: -25, pan: 0.0 }
        ]
      },
      thick: {
        label: "超厚歌劇",
        description: "上下八度和多層三五度，最厚，但也最容易糊。",
        intervals: [
          { name: "低八度", semitone: -12, gain: -16, pan: -0.18 },
          { name: "低五度", semitone: -7, gain: -23, pan: 0.18 },
          { name: "低三度", semitone: -3, gain: -25, pan: -0.05 },
          { name: "大三度", semitone: 4, gain: -17, pan: -0.32 },
          { name: "五度", semitone: 7, gain: -17, pan: 0.32 },
          { name: "高八度", semitone: 12, gain: -20, pan: 0.0 },
          { name: "高三度", semitone: 16, gain: -26, pan: -0.12 },
          { name: "高五度", semitone: 19, gain: -27, pan: 0.12 }
        ]
      }
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function percentToDb(percent, minDb = -60, maxDb = -6) {
      if (percent <= 0) return -60;
      const t = percent / 100;
      return lerp(minDb, maxDb, t);
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function midiToNote(midi) {
      const rounded = Math.round(midi);
      const name = noteNames[((rounded % 12) + 12) % 12];
      const octave = Math.floor(rounded / 12) - 1;
      return `${name}${octave}`;
    }

    function freqToMidi(freq) {
      return 69 + 12 * Math.log2(freq / 440);
    }

    function autoCorrelate(buffer, sampleRate) {
      const SIZE = buffer.length;
      let rms = 0;

      for (let i = 0; i < SIZE; i++) {
        const val = buffer[i];
        rms += val * val;
      }

      rms = Math.sqrt(rms / SIZE);
      detectedRms = rms;

      const sensitivity = Number(senseSlider.value);
      const rmsThreshold = lerp(0.035, 0.010, sensitivity / 100);

      if (rms < rmsThreshold) {
        return null;
      }

      let r1 = 0;
      let r2 = SIZE - 1;
      const threshold = 0.2;

      for (let i = 0; i < SIZE / 2; i++) {
        if (Math.abs(buffer[i]) < threshold) {
          r1 = i;
          break;
        }
      }

      for (let i = 1; i < SIZE / 2; i++) {
        if (Math.abs(buffer[SIZE - i]) < threshold) {
          r2 = SIZE - i;
          break;
        }
      }

      buffer = buffer.slice(r1, r2);
      const newSize = buffer.length;

      const correlations = new Array(newSize).fill(0);

      for (let lag = 0; lag < newSize; lag++) {
        for (let i = 0; i < newSize - lag; i++) {
          correlations[lag] += buffer[i] * buffer[i + lag];
        }
      }

      let d = 0;
      while (d < newSize - 1 && correlations[d] > correlations[d + 1]) {
        d++;
      }

      let maxValue = -1;
      let maxPosition = -1;

      for (let i = d; i < newSize; i++) {
        if (correlations[i] > maxValue) {
          maxValue = correlations[i];
          maxPosition = i;
        }
      }

      if (maxPosition <= 0) return null;

      const x1 = correlations[maxPosition - 1] || 0;
      const x2 = correlations[maxPosition] || 0;
      const x3 = correlations[maxPosition + 1] || 0;

      const a = (x1 + x3 - 2 * x2) / 2;
      const b = (x3 - x1) / 2;

      let betterPosition = maxPosition;
      if (a) {
        betterPosition = maxPosition - b / (2 * a);
      }

      const frequency = sampleRate / betterPosition;

      if (frequency < 70 || frequency > 1000) {
        return null;
      }

      return frequency;
    }

    async function setupAudio() {
      await Tone.start();

      mic = new Tone.UserMedia();

      analyser = new Tone.Analyser("waveform", 4096);

      master = new Tone.Volume(-4).toDestination();
      limiter = new Tone.Limiter(-1).connect(master);

      reverb = new Tone.Reverb({
        decay: 6.2,
        preDelay: 0.035,
        wet: Number(reverbSlider.value) / 100
      });

      await reverb.generate();

      chorus = new Tone.Chorus({
        frequency: 0.42,
        delayTime: 4.8,
        depth: 0.72,
        wet: 0.38
      }).start();

      wetBus = new Tone.Gain(0.9);
      wetBus.chain(chorus, reverb, limiter);

      dryVolume = new Tone.Volume(percentToDb(Number(drySlider.value), -60, -14));
      dryVolume.connect(limiter);

      await mic.open();

      mic.connect(analyser);
      mic.connect(dryVolume);

      buildHarmonyLayers(currentMode);

      audioReady = true;
    }

    function disposeLayers() {
      layerNodes.forEach(layer => {
        try {
          layer.input.disconnect();
          layer.pitchShift.dispose();
          layer.volume.dispose();
          layer.pan.dispose();
        } catch (e) {}
      });

      layerNodes = [];
    }

    function buildHarmonyLayers(modeKey) {
      if (!mic || !wetBus) return;

      disposeLayers();

      const mode = modes[modeKey];
      modeLabel.textContent = mode.label;

      mode.intervals.forEach((layer, index) => {
        const input = new Tone.Gain(1);

        const pitchShift = new Tone.PitchShift({
          pitch: layer.semitone,
          windowSize: 0.09,
          delayTime: 0,
          feedback: 0,
          wet: 1
        });

        const pan = new Tone.Panner(layer.pan || 0);
        const volume = new Tone.Volume(-60);

        mic.connect(input);
        input.chain(pitchShift, pan, volume, wetBus);

        layerNodes.push({
          ...layer,
          index,
          input,
          pitchShift,
          pan,
          volume,
          currentDb: -60
        });
      });

      updateStatus();
    }

    function updateDetection() {
      if (!audioReady || !analyser) return;

      const buffer = analyser.getValue();
      const sampleRate = Tone.getContext().sampleRate;

      const freq = autoCorrelate(buffer, sampleRate);

      const rmsNorm = clamp(detectedRms * 18, 0, 1);
      smoothEnergy = lerp(smoothEnergy, rmsNorm, 0.16);

      if (freq) {
        detectedPitch = freq;
        const midi = freqToMidi(freq);
        const roundedMidi = Math.round(midi);
        detectedCents = Math.round((midi - roundedMidi) * 100);
        detectedNote = midiToNote(roundedMidi);
        voiceActive = true;
      } else {
        voiceActive = false;
      }
    }

    function updateAudioLevels() {
      if (!audioReady) return;

      const amount = Number(amountSlider.value) / 100;
      const active = voiceActive ? 1 : 0;
      const gate = active * clamp(smoothEnergy * 1.35, 0, 1);

      layerNodes.forEach((layer, i) => {
        const modeBoost = layerNodes.length > 6 ? -2 : 0;
        const targetDb = gate > 0.02
          ? layer.gain + modeBoost + (amount - 1) * 34 + gate * 4
          : -60;

        layer.currentDb = lerp(layer.currentDb, targetDb, targetDb > layer.currentDb ? 0.12 : 0.07);
        if (layer.currentDb < -58) layer.currentDb = -60;

        layer.volume.volume.rampTo(layer.currentDb, 0.08);
      });

      const dryPercent = Number(drySlider.value);
      const dryDb = percentToDb(dryPercent, -60, -14);
      dryVolume.volume.rampTo(dryDb, 0.12);
    }

    function updateDisplay() {
      displayEnergy = lerp(displayEnergy, voiceActive ? clamp(smoothEnergy, 0, 1) : 0, 0.14);

      if (voiceActive && detectedPitch) {
        noteNameEl.textContent = detectedNote;

        const centsText =
          detectedCents > 8 ? `偏高 ${detectedCents} cents` :
          detectedCents < -8 ? `偏低 ${Math.abs(detectedCents)} cents` :
          `音準接近中心`;

        noteMetaEl.innerHTML = `
          ${detectedPitch.toFixed(1)} Hz<br>
          ${centsText}
        `;
      } else {
        noteNameEl.textContent = "—";
        noteMetaEl.innerHTML = "等待你的聲音";
      }

      const scale = 1 + displayEnergy * 0.055;
      const glow = 80 + displayEnergy * 110;
      const alpha = 0.18 + displayEnergy * 0.32;

      noteOrb.style.transform = `scale(${scale})`;
      noteOrb.style.boxShadow = `
        inset 0 1px 0 rgba(255,255,255,0.34),
        inset 0 -28px 60px rgba(255,255,255,0.05),
        0 0 ${glow}px rgba(255, 215, 255, ${alpha}),
        0 0 ${glow * 1.8}px rgba(160, 210, 255, ${alpha * 0.55})
      `;

      updateStatus();
    }

    function updateStatus() {
      const mode = modes[currentMode];
      const activeLayers = layerNodes
        .filter(layer => layer.currentDb > -50)
        .map(layer => layer.name)
        .join("、");

      statusEl.innerHTML = `
        模式：${mode.label}<br>
        說明：${mode.description}<br>
        偵測：${voiceActive ? `${detectedNote} / ${detectedPitch?.toFixed(1)} Hz` : "尚未偵測到穩定歌聲"}<br>
        正在疊加：${activeLayers || "尚未疊加"}
      `;
    }

    function drawBackground(t) {
      ctx.clearRect(0, 0, W, H);

      const g = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.75);
      g.addColorStop(0, "rgba(255, 225, 255, 0.10)");
      g.addColorStop(0.42, "rgba(120, 170, 255, 0.055)");
      g.addColorStop(1, "rgba(0, 0, 0, 0)");

      ctx.fillStyle = "#050511";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      const count = 48;
      ctx.save();
      ctx.globalCompositeOperation = "screen";

      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + t * 0.00012;
        const radius = Math.min(W, H) * (0.20 + 0.26 * Math.sin(t * 0.00021 + i) ** 2);
        const x = W / 2 + Math.cos(angle) * radius * (1 + displayEnergy * 0.25);
        const y = H / 2 + Math.sin(angle) * radius * (1 + displayEnergy * 0.25);

        const size = 1.2 + displayEnergy * 5 + (i % 5) * 0.3;

        ctx.fillStyle = `rgba(255, 235, 255, ${0.06 + displayEnergy * 0.12})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawWaveform() {
      if (!audioReady || !analyser) return;

      const buffer = analyser.getValue();
      const midY = H * 0.82;
      const width = Math.min(W * 0.72, 760);
      const startX = (W - width) / 2;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.lineWidth = 2;
      ctx.strokeStyle = `rgba(255, 235, 255, ${0.18 + displayEnergy * 0.48})`;
      ctx.shadowColor = `rgba(255, 220, 255, ${0.25 + displayEnergy * 0.5})`;
      ctx.shadowBlur = 18 + displayEnergy * 24;

      ctx.beginPath();

      for (let i = 0; i < buffer.length; i += 8) {
        const x = startX + (i / (buffer.length - 1)) * width;
        const y = midY + buffer[i] * (38 + displayEnergy * 90);

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      ctx.stroke();
      ctx.restore();
    }

    function drawLayerRings(t) {
      const centerX = W / 2;
      const centerY = H / 2;
      const base = Math.min(W, H) * 0.30;

      ctx.save();
      ctx.globalCompositeOperation = "screen";

      layerNodes.forEach((layer, i) => {
        const active = clamp((layer.currentDb + 60) / 42, 0, 1);
        if (active <= 0.01) return;

        const r = base + i * 18 + Math.sin(t * 0.001 + i) * 6;
        const start = t * 0.00045 * (i % 2 ? -1 : 1) + i;
        const end = start + Math.PI * (0.85 + active * 0.9);

        ctx.lineWidth = 1.5 + active * 3.2;
        ctx.strokeStyle = `rgba(255, 235, 255, ${0.10 + active * 0.38})`;
        ctx.shadowColor = `rgba(180, 220, 255, ${0.18 + active * 0.30})`;
        ctx.shadowBlur = 12 + active * 26;

        ctx.beginPath();
        ctx.arc(centerX, centerY, r, start, end);
        ctx.stroke();
      });

      ctx.restore();
    }

    function animate() {
      if (!running) return;

      const t = performance.now();

      updateDetection();
      updateAudioLevels();
      updateDisplay();

      drawBackground(t);
      drawLayerRings(t);
      drawWaveform();

      requestAnimationFrame(animate);
    }

    modeSelect.addEventListener("change", () => {
      currentMode = modeSelect.value;
      buildHarmonyLayers(currentMode);
    });

    amountSlider.addEventListener("input", () => {
      amountLabel.textContent = `${amountSlider.value}%`;
    });

    drySlider.addEventListener("input", () => {
      dryLabel.textContent = `${drySlider.value}%`;
    });

    reverbSlider.addEventListener("input", () => {
      reverbLabel.textContent = `${reverbSlider.value}%`;

      if (audioReady && reverb) {
        reverb.wet.rampTo(Number(reverbSlider.value) / 100, 0.2);
      }
    });

    senseSlider.addEventListener("input", () => {
      senseLabel.textContent = `${senseSlider.value}%`;
    });

    muteBtn.addEventListener("click", () => {
      if (!audioReady || !master) return;

      muted = !muted;

      if (muted) {
        master.volume.rampTo(-60, 0.18);
        muteBtn.textContent = "恢復聲音";
      } else {
        master.volume.rampTo(-4, 0.18);
        muteBtn.textContent = "暫停聲音";
      }
    });

    panicBtn.addEventListener("click", () => {
      layerNodes.forEach(layer => {
        layer.currentDb = -60;
        layer.volume.volume.rampTo(-60, 0.04);
      });

      if (dryVolume) dryVolume.volume.rampTo(-60, 0.04);
      setTimeout(() => {
        if (dryVolume) {
          dryVolume.volume.rampTo(percentToDb(Number(drySlider.value), -60, -14), 0.2);
        }
      }, 240);
    });

    startBtn.addEventListener("click", async () => {
      startBtn.disabled = true;
      startBtn.textContent = "啟動中...";

      try {
        resize();
        await setupAudio();

        running = true;
        overlay.style.display = "none";

        animate();

        statusEl.innerHTML = `
          已啟動。請戴耳機，然後唱一個長音。<br>
          如果沒有聲音，請確認瀏覽器允許麥克風。
        `;
      } catch (err) {
        console.error(err);
        startBtn.disabled = false;
        startBtn.textContent = "重新啟動";

        statusEl.innerHTML = `
          啟動失敗：${err.message}<br>
          請確認網址是 https，並且瀏覽器有允許麥克風權限。
        `;
      }
    });

    window.addEventListener("resize", resize);

    resize();
  </script>
</body>
</html>
