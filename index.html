<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Voice Harmonizer｜手勢人聲和聲器</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 210, 250, 0.22), transparent 34%),
        radial-gradient(circle at 82% 24%, rgba(180, 220, 255, 0.18), transparent 36%),
        radial-gradient(circle at 50% 92%, rgba(255, 230, 180, 0.11), transparent 42%),
        #050511;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    #video {
      display: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: #050511;
    }

    .panel {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      width: min(390px, calc(100vw - 28px));
      padding: 14px;
      border-radius: 22px;
      background: rgba(8, 8, 22, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.03em;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 11px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.68);
      margin-bottom: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 9px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.78);
    }

    input[type="range"] {
      width: 100%;
      accent-color: rgba(255, 224, 255, 0.9);
    }

    select {
      width: 100%;
      margin-top: 6px;
      padding: 9px 10px;
      border-radius: 999px;
      color: white;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.18);
      outline: none;
    }

    option {
      color: #111;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 12px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, rgba(255, 218, 255, 0.30), rgba(190, 220, 255, 0.22));
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 10px 24px rgba(0,0,0,0.20);
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    .status {
      margin-top: 11px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.10);
      font-size: 11px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.70);
    }

    .center-orb {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 4;
      transform: translate(-50%, -50%);
      width: min(340px, 54vw);
      aspect-ratio: 1 / 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      text-align: center;
      pointer-events: none;
      background:
        radial-gradient(circle at 33% 27%, rgba(255,255,255,0.52), transparent 12%),
        radial-gradient(circle at 65% 70%, rgba(180,220,255,0.16), transparent 36%),
        linear-gradient(135deg, rgba(255, 225, 255, 0.20), rgba(170, 215, 255, 0.13), rgba(255, 239, 190, 0.11));
      border: 1.5px solid rgba(255, 255, 255, 0.20);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.30),
        inset 0 -28px 60px rgba(255,255,255,0.045),
        0 0 80px rgba(255, 215, 255, 0.18),
        0 0 160px rgba(160, 210, 255, 0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .note {
      font-size: clamp(48px, 10vw, 96px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.05em;
      text-shadow: 0 0 28px rgba(255, 225, 255, 0.45);
    }

    .meta {
      margin-top: 10px;
      font-size: clamp(12px, 2vw, 15px);
      color: rgba(255,255,255,0.66);
      line-height: 1.55;
    }

    .hint {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      max-width: min(430px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 18px;
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      line-height: 1.55;
      background: rgba(10, 10, 24, 0.42);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 210, 250, 0.18), transparent 34%),
        rgba(4, 4, 12, 0.88);
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
    }

    .start-card {
      width: min(560px, 100%);
      padding: 30px;
      border-radius: 30px;
      text-align: center;
      background: linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.045));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 28px 90px rgba(0,0,0,0.42);
    }

    .start-card h1 {
      margin: 0 0 12px;
      font-size: clamp(31px, 7vw, 62px);
      letter-spacing: -0.04em;
      line-height: 1.02;
    }

    .start-card p {
      margin: 0 auto 22px;
      max-width: 430px;
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,0.78);
    }

    #startBtn {
      font-size: 16px;
      padding: 14px 24px;
      background: linear-gradient(135deg, rgba(255, 230, 255, 0.38), rgba(200, 230, 255, 0.26));
    }

    @media (max-width: 720px) {
      .panel {
        width: calc(100vw - 24px);
        left: 12px;
        top: 12px;
        padding: 11px;
      }

      .subtitle {
        display: none;
      }

      .center-orb {
        top: 56%;
        width: min(300px, 58vw);
      }

      .hint {
        left: 12px;
        right: 12px;
        bottom: 12px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <video id="video" playsinline muted></video>
  <canvas id="stage"></canvas>

  <div class="panel">
    <div class="title">Gesture Voice Harmonizer</div>
    <div class="subtitle">
      你唱歌，麥克風收音；你的手勢控制哪些人聲和聲效果出現。建議戴耳機。
    </div>

    <div class="row">
      <span>和聲模式</span>
      <span id="modeLabel">華麗大調</span>
    </div>
    <select id="modeSelect">
      <option value="major">華麗大調 Choir Rock</option>
      <option value="minor">陰暗小調 Dark Minor</option>
      <option value="open">空靈開放 Angelic Open</option>
    </select>

    <div class="row">
      <span>原聲音量</span>
      <span id="dryLabel">18%</span>
    </div>
    <input id="drySlider" type="range" min="0" max="100" step="1" value="18" />

    <div class="row">
      <span>和聲總量</span>
      <span id="harmonyLabel">75%</span>
    </div>
    <input id="harmonySlider" type="range" min="0" max="100" step="1" value="75" />

    <div class="row">
      <span>殘響空間</span>
      <span id="reverbLabel">48%</span>
    </div>
    <input id="reverbSlider" type="range" min="0" max="90" step="1" value="48" />

    <div class="row">
      <span>偵測靈敏度</span>
      <span id="senseLabel">45%</span>
    </div>
    <input id="senseSlider" type="range" min="15" max="80" step="1" value="45" />

    <div class="button-row">
      <button id="muteBtn">暫停聲音</button>
      <button id="panicBtn">全部切掉</button>
    </div>

    <div class="status" id="status">
      尚未啟動。請按下開始，允許相機與麥克風。
    </div>
  </div>

  <div class="center-orb" id="centerOrb">
    <div>
      <div class="note" id="noteName">—</div>
      <div class="meta" id="noteMeta">等待你的歌聲</div>
    </div>
  </div>

  <div class="hint">
    使用方式：一邊唱長音，一邊用手指碰圓盤。左上是三度，右上是五度，左下是高八度，右下是低八度。手越靠近圓心，該層和聲越明顯。
  </div>

  <div class="overlay" id="overlay">
    <div class="start-card">
      <h1>Sing, Then<br>Conduct Yourself</h1>
      <p>
        這不是合成器，而是即時人聲效果器。
        你唱進麥克風，網頁會把你的聲音複製成多層和聲；
        你的手負責控制哪些和聲層出現。
        請戴耳機，避免回授尖叫。
      </p>
      <button id="startBtn">開始使用相機與麥克風</button>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");

    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const muteBtn = document.getElementById("muteBtn");
    const panicBtn = document.getElementById("panicBtn");

    const statusEl = document.getElementById("status");
    const centerOrb = document.getElementById("centerOrb");
    const noteNameEl = document.getElementById("noteName");
    const noteMetaEl = document.getElementById("noteMeta");

    const modeSelect = document.getElementById("modeSelect");
    const modeLabel = document.getElementById("modeLabel");

    const drySlider = document.getElementById("drySlider");
    const dryLabel = document.getElementById("dryLabel");

    const harmonySlider = document.getElementById("harmonySlider");
    const harmonyLabel = document.getElementById("harmonyLabel");

    const reverbSlider = document.getElementById("reverbSlider");
    const reverbLabel = document.getElementById("reverbLabel");

    const senseSlider = document.getElementById("senseSlider");
    const senseLabel = document.getElementById("senseLabel");

    let W = window.innerWidth;
    let H = window.innerHeight;

    let running = false;
    let audioReady = false;
    let muted = false;

    let hands = null;
    let lastSeenHandsAt = 0;
    let fingertipPoints = [];

    let mic;
    let analyser;
    let master;
    let limiter;
    let dryVolume;
    let wetBus;
    let chorus;
    let reverb;
    let filter;

    let zones = [];
    let layers = {};
    let currentMode = "major";

    let detectedPitch = null;
    let detectedNote = "—";
    let detectedCents = 0;
    let detectedRms = 0;
    let voiceActive = false;
    let smoothEnergy = 0;
    let displayEnergy = 0;

    const fingertipIds = [4, 8, 12, 16, 20];
    const noteNames = ["C", "C♯", "D", "E♭", "E", "F", "F♯", "G", "A♭", "A", "B♭", "B"];

    const modeIntervals = {
      major: {
        label: "華麗大調",
        description: "比較像華麗搖滾、明亮合唱。",
        intervals: {
          third: 4,
          fifth: 7,
          high: 12,
          low: -12
        }
      },
      minor: {
        label: "陰暗小調",
        description: "比較悲劇、暗色、戲劇感。",
        intervals: {
          third: 3,
          fifth: 7,
          high: 12,
          low: -12
        }
      },
      open: {
        label: "空靈開放",
        description: "比較透明，三度變少，五度與八度比較明顯。",
        intervals: {
          third: 7,
          fifth: 12,
          high: 19,
          low: -12
        }
      }
    };

    const layerDefs = {
      third: {
        label: "三度",
        fullLabel: "上三度",
        baseDb: -15,
        pan: -0.35
      },
      fifth: {
        label: "五度",
        fullLabel: "上五度",
        baseDb: -16,
        pan: 0.35
      },
      high: {
        label: "高八度",
        fullLabel: "高八度",
        baseDb: -20,
        pan: -0.10
      },
      low: {
        label: "低八度",
        fullLabel: "低八度",
        baseDb: -14,
        pan: 0.10
      }
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function percentToDb(percent, minDb = -60, maxDb = -8) {
      if (percent <= 0) return -60;
      return lerp(minDb, maxDb, percent / 100);
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;

      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      layoutZones();
    }

    function layoutZones() {
      const old = {};
      zones.forEach(z => {
        old[z.key] = z.level || 0;
      });

      const r = clamp(Math.min(W, H) * 0.13, 74, 135);

      zones = [
        {
          key: "third",
          x: W * 0.31,
          y: H * 0.35,
          r,
          target: 0,
          level: old.third || 0
        },
        {
          key: "fifth",
          x: W * 0.69,
          y: H * 0.35,
          r,
          target: 0,
          level: old.fifth || 0
        },
        {
          key: "high",
          x: W * 0.31,
          y: H * 0.67,
          r,
          target: 0,
          level: old.high || 0
        },
        {
          key: "low",
          x: W * 0.69,
          y: H * 0.67,
          r,
          target: 0,
          level: old.low || 0
        }
      ];

      if (W < 720) {
        const mobileR = clamp(Math.min(W, H) * 0.15, 62, 105);

        zones[0].x = W * 0.28;
        zones[0].y = H * 0.42;
        zones[1].x = W * 0.72;
        zones[1].y = H * 0.42;
        zones[2].x = W * 0.28;
        zones[2].y = H * 0.66;
        zones[3].x = W * 0.72;
        zones[3].y = H * 0.66;

        zones.forEach(z => z.r = mobileR);
      }
    }

    function midiToNote(midi) {
      const rounded = Math.round(midi);
      const name = noteNames[((rounded % 12) + 12) % 12];
      const octave = Math.floor(rounded / 12) - 1;
      return `${name}${octave}`;
    }

    function freqToMidi(freq) {
      return 69 + 12 * Math.log2(freq / 440);
    }

    function autoCorrelate(buffer, sampleRate) {
      const SIZE = buffer.length;
      let rms = 0;

      for (let i = 0; i < SIZE; i++) {
        const val = buffer[i];
        rms += val * val;
      }

      rms = Math.sqrt(rms / SIZE);
      detectedRms = rms;

      const sensitivity = Number(senseSlider.value);
      const rmsThreshold = lerp(0.035, 0.010, sensitivity / 100);

      if (rms < rmsThreshold) {
        return null;
      }

      let r1 = 0;
      let r2 = SIZE - 1;
      const threshold = 0.2;

      for (let i = 0; i < SIZE / 2; i++) {
        if (Math.abs(buffer[i]) < threshold) {
          r1 = i;
          break;
        }
      }

      for (let i = 1; i < SIZE / 2; i++) {
        if (Math.abs(buffer[SIZE - i]) < threshold) {
          r2 = SIZE - i;
          break;
        }
      }

      buffer = buffer.slice(r1, r2);
      const newSize = buffer.length;

      const correlations = new Array(newSize).fill(0);

      for (let lag = 0; lag < newSize; lag++) {
        for (let i = 0; i < newSize - lag; i++) {
          correlations[lag] += buffer[i] * buffer[i + lag];
        }
      }

      let d = 0;
      while (d < newSize - 1 && correlations[d] > correlations[d + 1]) {
        d++;
      }

      let maxValue = -1;
      let maxPosition = -1;

      for (let i = d; i < newSize; i++) {
        if (correlations[i] > maxValue) {
          maxValue = correlations[i];
          maxPosition = i;
        }
      }

      if (maxPosition <= 0) return null;

      const x1 = correlations[maxPosition - 1] || 0;
      const x2 = correlations[maxPosition] || 0;
      const x3 = correlations[maxPosition + 1] || 0;

      const a = (x1 + x3 - 2 * x2) / 2;
      const b = (x3 - x1) / 2;

      let betterPosition = maxPosition;
      if (a) {
        betterPosition = maxPosition - b / (2 * a);
      }

      const frequency = sampleRate / betterPosition;

      if (frequency < 70 || frequency > 1000) {
        return null;
      }

      return frequency;
    }

    async function setupAudio() {
      await Tone.start();

      mic = new Tone.UserMedia();
      analyser = new Tone.Analyser("waveform", 4096);

      master = new Tone.Volume(-4).toDestination();
      limiter = new Tone.Limiter(-1).connect(master);

      reverb = new Tone.Reverb({
        decay: 6.4,
        preDelay: 0.035,
        wet: Number(reverbSlider.value) / 100
      });

      await reverb.generate();

      chorus = new Tone.Chorus({
        frequency: 0.38,
        delayTime: 4.6,
        depth: 0.72,
        wet: 0.36
      }).start();

      filter = new Tone.Filter({
        type: "lowpass",
        frequency: 4700,
        rolloff: -12,
        Q: 0.7
      });

      wetBus = new Tone.Gain(0.95);
      wetBus.chain(chorus, filter, reverb, limiter);

      dryVolume = new Tone.Volume(percentToDb(Number(drySlider.value), -60, -13));
      dryVolume.connect(limiter);

      await mic.open();

      mic.connect(analyser);
      mic.connect(dryVolume);

      buildHarmonyLayers();

      audioReady = true;
    }

    function disposeHarmonyLayers() {
      Object.keys(layers).forEach(key => {
        const layer = layers[key];
        try {
          layer.input.disconnect();
          layer.pitch.dispose();
          layer.pan.dispose();
          layer.volume.dispose();
        } catch (err) {}
      });

      layers = {};
    }

    function buildHarmonyLayers() {
      if (!mic || !wetBus) return;

      disposeHarmonyLayers();

      const mode = modeIntervals[currentMode];
      modeLabel.textContent = mode.label;

      Object.keys(layerDefs).forEach(key => {
        const def = layerDefs[key];
        const semitone = mode.intervals[key];

        const input = new Tone.Gain(1);

        const pitch = new Tone.PitchShift({
          pitch: semitone,
          windowSize: 0.09,
          delayTime: 0,
          feedback: 0,
          wet: 1
        });

        const pan = new Tone.Panner(def.pan);
        const volume = new Tone.Volume(-60);

        mic.connect(input);
        input.chain(pitch, pan, volume, wetBus);

        layers[key] = {
          key,
          semitone,
          input,
          pitch,
          pan,
          volume,
          currentDb: -60
        };
      });

      updateStatus();
    }

    async function setupCameraAndHands() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("這個瀏覽器不支援相機或麥克風。");
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 1280 },
          height: { ideal: 720 },
          facingMode: "user"
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      hands = new Hands({
        locateFile: file => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }
      });

      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.62,
        minTrackingConfidence: 0.62
      });

      hands.onResults(onHandResults);
    }

    async function processVideoFrame() {
      if (!running || !hands) return;

      try {
        await hands.send({ image: video });
      } catch (err) {
        console.error(err);
      }

      requestAnimationFrame(processVideoFrame);
    }

    function onHandResults(results) {
      fingertipPoints = [];
      zones.forEach(z => z.target = 0);

      if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        return;
      }

      lastSeenHandsAt = performance.now();

      for (const landmarks of results.multiHandLandmarks) {
        for (const id of fingertipIds) {
          const p = landmarks[id];

          const x = (1 - p.x) * W;
          const y = p.y * H;

          fingertipPoints.push({ x, y });

          zones.forEach(zone => {
            const dx = x - zone.x;
            const dy = y - zone.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < zone.r) {
              const strength = 1 - distance / zone.r;
              zone.target = Math.max(zone.target, clamp(0.42 + strength * 0.70, 0, 1));
            }
          });
        }
      }
    }

    function updateZoneLevels() {
      const now = performance.now();

      if (now - lastSeenHandsAt > 850) {
        zones.forEach(z => z.target = 0);
        fingertipPoints = [];
      }

      zones.forEach(zone => {
        const speed = zone.target > zone.level ? 0.16 : 0.075;
        zone.level = lerp(zone.level, zone.target, speed);
        if (zone.level < 0.004) zone.level = 0;
      });
    }

    function updateDetection() {
      if (!audioReady || !analyser) return;

      const buffer = analyser.getValue();
      const sampleRate = Tone.getContext().sampleRate;

      const freq = autoCorrelate(buffer, sampleRate);
      const rmsNorm = clamp(detectedRms * 18, 0, 1);

      smoothEnergy = lerp(smoothEnergy, rmsNorm, 0.16);

      if (freq) {
        detectedPitch = freq;
        const midi = freqToMidi(freq);
        const roundedMidi = Math.round(midi);
        detectedCents = Math.round((midi - roundedMidi) * 100);
        detectedNote = midiToNote(roundedMidi);
        voiceActive = true;
      } else {
        voiceActive = false;
      }
    }

    function updateAudioFromGesture() {
      if (!audioReady) return;

      const harmonyAmount = Number(harmonySlider.value) / 100;
      const voiceGate = voiceActive ? clamp(smoothEnergy * 1.35, 0, 1) : 0;

      let activeSum = 0;

      zones.forEach(zone => {
        const layer = layers[zone.key];
        const def = layerDefs[zone.key];

        if (!layer) return;

        activeSum += zone.level;

        const gestureLevel = zone.level;
        const targetDb = gestureLevel > 0.01 && voiceGate > 0.02
          ? def.baseDb + (harmonyAmount - 1) * 34 + (gestureLevel - 1) * 24 + voiceGate * 4
          : -60;

        layer.currentDb = lerp(layer.currentDb, targetDb, targetDb > layer.currentDb ? 0.14 : 0.075);
        if (layer.currentDb < -58) layer.currentDb = -60;

        layer.volume.volume.rampTo(layer.currentDb, 0.08);
      });

      const dryDb = percentToDb(Number(drySlider.value), -60, -13);
      dryVolume.volume.rampTo(dryDb, 0.12);

      const openness = clamp(activeSum / 4, 0, 1);
      const filterFreq = lerp(2400, 5600, openness);
      filter.frequency.rampTo(filterFreq, 0.18);
    }

    function updateDisplay() {
      displayEnergy = lerp(displayEnergy, voiceActive ? clamp(smoothEnergy, 0, 1) : 0, 0.14);

      if (voiceActive && detectedPitch) {
        noteNameEl.textContent = detectedNote;

        const centsText =
          detectedCents > 8 ? `偏高 ${detectedCents} cents` :
          detectedCents < -8 ? `偏低 ${Math.abs(detectedCents)} cents` :
          `音準接近中心`;

        noteMetaEl.innerHTML = `
          ${detectedPitch.toFixed(1)} Hz<br>
          ${centsText}
        `;
      } else {
        noteNameEl.textContent = "—";
        noteMetaEl.innerHTML = "等待你的歌聲";
      }

      const scale = 1 + displayEnergy * 0.055;
      const glow = 80 + displayEnergy * 110;
      const alpha = 0.18 + displayEnergy * 0.32;

      centerOrb.style.transform = `translate(-50%, -50%) scale(${scale})`;
      centerOrb.style.boxShadow = `
        inset 0 1px 0 rgba(255,255,255,0.34),
        inset 0 -28px 60px rgba(255,255,255,0.05),
        0 0 ${glow}px rgba(255, 215, 255, ${alpha}),
        0 0 ${glow * 1.8}px rgba(160, 210, 255, ${alpha * 0.55})
      `;

      updateStatus();
    }

    function updateStatus() {
      const mode = modeIntervals[currentMode];

      const activeZones = zones
        .filter(z => z.level > 0.08)
        .map(z => layerDefs[z.key].fullLabel)
        .join("、");

      statusEl.innerHTML = `
        模式：${mode.label}<br>
        說明：${mode.description}<br>
        偵測歌聲：${voiceActive ? `${detectedNote} / ${detectedPitch?.toFixed(1)} Hz` : "尚未偵測到穩定歌聲"}<br>
        手勢開啟：${activeZones || "尚未開啟和聲層"}
      `;
    }

    function drawVideoBackground() {
      ctx.save();

      if (video.videoWidth && video.videoHeight) {
        const vw = video.videoWidth;
        const vh = video.videoHeight;

        const scale = Math.max(W / vw, H / vh);
        const dw = vw * scale;
        const dh = vh * scale;
        const dx = (W - dw) / 2;
        const dy = (H - dh) / 2;

        ctx.translate(W, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, dx, dy, dw, dh);
      }

      ctx.restore();

      ctx.fillStyle = "rgba(4, 4, 16, 0.62)";
      ctx.fillRect(0, 0, W, H);

      const g = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.72);
      g.addColorStop(0, "rgba(255, 225, 255, 0.10)");
      g.addColorStop(0.44, "rgba(120, 170, 255, 0.055)");
      g.addColorStop(1, "rgba(0, 0, 0, 0)");

      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    function drawZone(zone, t) {
      const def = layerDefs[zone.key];
      const mode = modeIntervals[currentMode];
      const semitone = mode.intervals[zone.key];

      const level = zone.level;
      const pulse = 0.5 + 0.5 * Math.sin(t * 0.0022 + zone.x * 0.01);
      const r = zone.r * (1 + level * 0.055 + pulse * 0.012);

      ctx.save();

      ctx.globalCompositeOperation = "screen";

      const glow = ctx.createRadialGradient(zone.x, zone.y, 0, zone.x, zone.y, r * 1.75);
      glow.addColorStop(0, `rgba(255, 235, 255, ${0.13 + level * 0.38})`);
      glow.addColorStop(0.35, `rgba(190, 220, 255, ${0.08 + level * 0.25})`);
      glow.addColorStop(1, "rgba(255, 255, 255, 0)");

      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(zone.x, zone.y, r * 1.75, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalCompositeOperation = "source-over";

      const pearl = ctx.createRadialGradient(
        zone.x - r * 0.38,
        zone.y - r * 0.42,
        r * 0.04,
        zone.x,
        zone.y,
        r
      );

      pearl.addColorStop(0, `rgba(255, 255, 255, ${0.50 + level * 0.24})`);
      pearl.addColorStop(0.20, `rgba(255, 226, 255, ${0.30 + level * 0.22})`);
      pearl.addColorStop(0.48, `rgba(178, 218, 255, ${0.16 + level * 0.20})`);
      pearl.addColorStop(0.74, `rgba(255, 231, 190, ${0.12 + level * 0.14})`);
      pearl.addColorStop(1, `rgba(255, 255, 255, ${0.050 + level * 0.08})`);

      ctx.fillStyle = pearl;
      ctx.beginPath();
      ctx.arc(zone.x, zone.y, r, 0, Math.PI * 2);
      ctx.fill();

      const metal = ctx.createLinearGradient(zone.x - r, zone.y - r, zone.x + r, zone.y + r);
      metal.addColorStop(0, `rgba(255,255,255,${0.52 + level * 0.28})`);
      metal.addColorStop(0.26, `rgba(255,220,255,${0.16 + level * 0.24})`);
      metal.addColorStop(0.52, `rgba(170,220,255,${0.24 + level * 0.20})`);
      metal.addColorStop(0.78, `rgba(255,240,200,${0.14 + level * 0.22})`);
      metal.addColorStop(1, `rgba(255,255,255,${0.40 + level * 0.22})`);

      ctx.lineWidth = 2.2 + level * 3.4;
      ctx.strokeStyle = metal;
      ctx.beginPath();
      ctx.arc(zone.x, zone.y, r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.lineWidth = 6;
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.07 + level * 0.26})`;
      ctx.beginPath();
      ctx.arc(zone.x, zone.y, r * 0.82, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * level);
      ctx.stroke();

      ctx.shadowColor = `rgba(255, 230, 255, ${0.45 + level * 0.5})`;
      ctx.shadowBlur = 18 + level * 24;
      ctx.fillStyle = `rgba(255,255,255,${0.70 + level * 0.26})`;
      ctx.font = `800 ${clamp(r * 0.16, 13, 22)}px -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(def.label, zone.x, zone.y - 9);

      ctx.shadowBlur = 0;
      ctx.fillStyle = `rgba(255,255,255,${0.48 + level * 0.28})`;
      ctx.font = `${clamp(r * 0.095, 10, 14)}px -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif`;

      const sign = semitone > 0 ? "+" : "";
      ctx.fillText(`${sign}${semitone} 半音`, zone.x, zone.y + 19);

      ctx.restore();
    }

    function drawFingertips() {
      if (!fingertipPoints.length) return;

      ctx.save();
      ctx.globalCompositeOperation = "screen";

      fingertipPoints.forEach(p => {
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 24);
        g.addColorStop(0, "rgba(255,255,255,0.95)");
        g.addColorStop(0.25, "rgba(255,220,255,0.42)");
        g.addColorStop(1, "rgba(255,255,255,0)");

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 24, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.86)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4.2, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }

    function drawWaveform() {
      if (!audioReady || !analyser) return;

      const buffer = analyser.getValue();
      const midY = H * 0.87;
      const width = Math.min(W * 0.70, 720);
      const startX = (W - width) / 2;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.lineWidth = 2;
      ctx.strokeStyle = `rgba(255, 235, 255, ${0.16 + displayEnergy * 0.46})`;
      ctx.shadowColor = `rgba(255, 220, 255, ${0.22 + displayEnergy * 0.50})`;
      ctx.shadowBlur = 18 + displayEnergy * 24;

      ctx.beginPath();

      for (let i = 0; i < buffer.length; i += 8) {
        const x = startX + (i / (buffer.length - 1)) * width;
        const y = midY + buffer[i] * (32 + displayEnergy * 80);

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      ctx.stroke();
      ctx.restore();
    }

    function drawLayerRings(t) {
      const centerX = W / 2;
      const centerY = H / 2;
      const base = Math.min(W, H) * 0.24;

      ctx.save();
      ctx.globalCompositeOperation = "screen";

      zones.forEach((zone, i) => {
        const active = clamp(zone.level, 0, 1);
        if (active <= 0.01) return;

        const r = base + i * 22 + Math.sin(t * 0.001 + i) * 6;
        const start = t * 0.00045 * (i % 2 ? -1 : 1) + i;
        const end = start + Math.PI * (0.85 + active * 0.9);

        ctx.lineWidth = 1.5 + active * 3.2;
        ctx.strokeStyle = `rgba(255, 235, 255, ${0.10 + active * 0.36})`;
        ctx.shadowColor = `rgba(180, 220, 255, ${0.18 + active * 0.30})`;
        ctx.shadowBlur = 12 + active * 26;

        ctx.beginPath();
        ctx.arc(centerX, centerY, r, start, end);
        ctx.stroke();
      });

      ctx.restore();
    }

    function draw() {
      const t = performance.now();

      drawVideoBackground();
      drawLayerRings(t);
      zones.forEach(zone => drawZone(zone, t));
      drawFingertips();
      drawWaveform();
    }

    function animate() {
      if (!running) return;

      updateZoneLevels();
      updateDetection();
      updateAudioFromGesture();
      updateDisplay();
      draw();

      requestAnimationFrame(animate);
    }

    modeSelect.addEventListener("change", () => {
      currentMode = modeSelect.value;
      buildHarmonyLayers();
    });

    drySlider.addEventListener("input", () => {
      dryLabel.textContent = `${drySlider.value}%`;
    });

    harmonySlider.addEventListener("input", () => {
      harmonyLabel.textContent = `${harmonySlider.value}%`;
    });

    reverbSlider.addEventListener("input", () => {
      reverbLabel.textContent = `${reverbSlider.value}%`;

      if (audioReady && reverb) {
        reverb.wet.rampTo(Number(reverbSlider.value) / 100, 0.2);
      }
    });

    senseSlider.addEventListener("input", () => {
      senseLabel.textContent = `${senseSlider.value}%`;
    });

    muteBtn.addEventListener("click", () => {
      if (!audioReady || !master) return;

      muted = !muted;

      if (muted) {
        master.volume.rampTo(-60, 0.18);
        muteBtn.textContent = "恢復聲音";
      } else {
        master.volume.rampTo(-4, 0.18);
        muteBtn.textContent = "暫停聲音";
      }
    });

    panicBtn.addEventListener("click", () => {
      Object.keys(layers).forEach(key => {
        const layer = layers[key];
        layer.currentDb = -60;
        layer.volume.volume.rampTo(-60, 0.04);
      });

      if (dryVolume) {
        dryVolume.volume.rampTo(-60, 0.04);
        setTimeout(() => {
          dryVolume.volume.rampTo(percentToDb(Number(drySlider.value), -60, -13), 0.2);
        }, 240);
      }
    });

    startBtn.addEventListener("click", async () => {
      startBtn.disabled = true;
      startBtn.textContent = "啟動中...";

      try {
        resize();

        await setupAudio();
        await setupCameraAndHands();

        running = true;
        overlay.style.display = "none";

        processVideoFrame();
        animate();

        statusEl.innerHTML = `
          已啟動。請戴耳機，開始唱歌，並用手指碰圓盤控制和聲。<br>
          如果沒有聲音，請確認瀏覽器允許麥克風。
        `;
      } catch (err) {
        console.error(err);

        startBtn.disabled = false;
        startBtn.textContent = "重新啟動";

        statusEl.innerHTML = `
          啟動失敗：${err.message}<br>
          請確認網址是 https，並且瀏覽器有允許相機與麥克風權限。
        `;
      }
    });

    window.addEventListener("resize", resize);

    resize();
  </script>
</body>
</html>
